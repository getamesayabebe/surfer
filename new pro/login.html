<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>surfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-20">
        <div class="flex justify-between items-center mb-12">
            <a href="index.html" class="inline-flex items-center gap-3 text-white font-bold text-lg">
            </a>
            <a href="signup.html" class="text-sm text-indigo-300 hover:text-indigo-200">Create account</a>
        </div>
        <div class="glass-panel rounded-3xl border border-slate-700 p-10 shadow-xl">
            <div class="mb-8 text-center">
                <p class="text-sm uppercase tracking-[0.4em] text-indigo-400 mb-3">Member login</p>
                <h1 class="text-3xl font-bold text-white">Access your ForexPro dashboard</h1>
                <p class="text-slate-400 mt-3">Secure sign in to view portfolio insights, trading performance, and book recommendations.</p>
            </div>
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                    <input type="email" placeholder="you@example.com" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-indigo-500 focus:ring-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-indigo-500 focus:ring-indigo-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white rounded-2xl px-4 py-3 font-semibold hover:bg-indigo-500 transition-all">Log In</button>
            </form>
            <p class="mt-6 text-center text-slate-400">Don’t have an account? <a href="signup.html" class="text-indigo-300 hover:text-indigo-200">Sign up now</a></p>
        </div>
    </div>
</body>
</html>
