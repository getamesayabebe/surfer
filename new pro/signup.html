<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>surfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-20">
        <div class="flex justify-between items-center mb-12">
            <a href="index.html" class="inline-flex items-center gap-3 text-white font-bold text-lg">
            </a>
            <a href="login.html" class="text-sm text-indigo-300 hover:text-indigo-200">Already have account?</a>
        </div>
        <div class="glass-panel rounded-3xl border border-slate-700 p-10 shadow-xl">
            <div class="mb-8 text-center">
                <p class="text-sm uppercase tracking-[0.4em] text-indigo-400 mb-3">Create an account</p>
                <h1 class="text-3xl font-bold text-white">Join ForexPro today</h1>
                <p class="text-slate-400 mt-3">Sign up to save your trading profile, track book reads, and access premium resources.</p>
            </div>
            <div class="space-y-4 mb-6">
                <button class="w-full inline-flex items-center justify-center gap-3 rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.5 12.23c0-.8-.07-1.57-.21-2.31H12v4.37h5.9c-.26 1.4-1.05 2.58-2.24 3.38l3.64 2.83c2.13-1.97 3.36-4.86 3.36-8.27z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.47-1 7.29-2.72l-3.64-2.83c-1.01.68-2.29 1.08-3.65 1.08-2.8 0-5.17-1.9-6.02-4.45H2.1v2.79C3.9 20.95 7.72 23 12 23z" fill="#34A853"/>
                        <path d="M5.98 14.08c-.22-.66-.35-1.36-.35-2.08s.13-1.42.35-2.08V7.13H2.1A9.98 9.98 0 0 0 1 12c0 1.6.38 3.12 1.1 4.5l3.87-2.42z" fill="#FBBC05"/>
                        <path d="M12 4.77c1.62 0 3.08.56 4.22 1.66l3.16-3.16C17.45 1.28 14.95 0 12 0 7.72 0 3.9 2.05 2.1 5.13l3.88 2.79c.85-2.55 3.22-4.45 6.02-4.45z" fill="#EA4335"/>
                    </svg>
                    Sign up with Google
                </button>
                <div class="flex items-center gap-3 text-slate-500">
                    <span class="h-px flex-1 bg-slate-700"></span>
                    <span class="text-sm">or continue with</span>
                    <span class="h-px flex-1 bg-slate-700"></span>
                </div>
            </div>
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Full name</label>
                    <input type="text" placeholder="Your name" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-indigo-500 focus:ring-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                    <input type="email" placeholder="you@example.com" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-indigo-500 focus:ring-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" placeholder="Create password" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-indigo-500 focus:ring-indigo-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white rounded-2xl px-4 py-3 font-semibold hover:bg-indigo-500 transition-all">Sign Up</button>
            </form>
            <p class="mt-6 text-center text-slate-400">Already registered? <a href="login.html" class="text-indigo-300 hover:text-indigo-200">Log in</a></p>
        </div>
    </div>
</body>
</html>
